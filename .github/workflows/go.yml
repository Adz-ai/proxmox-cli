name: Go

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.x'
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check module files
        run: go mod tidy -diff
      - name: Check generated mocks
        run: go generate ./internal/interfaces && git diff --exit-code -- test/mocks/proxmox_client.go
      - name: Vet
        run: go vet ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
      - name: Test with race detector
        run: go test -race -shuffle=on ./...
      - name: Build
        run: go build -trimpath -ldflags "-X main.version=ci" ./...
