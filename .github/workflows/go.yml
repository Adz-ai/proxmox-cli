name: Go

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check module files
        run: go mod tidy -diff
      - name: Check generated mocks
        run: go generate ./internal/interfaces && git diff --exit-code -- test/mocks/proxmox_client.go
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -shuffle=on ./...
      - name: Build
        run: go build -trimpath -ldflags "-X main.version=ci" ./...
