name: Release

on:
  push:
    tags: ['v*']

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: Verify
        run: |
          test -z "$(gofmt -l .)"
          go mod tidy -diff
          go generate ./internal/interfaces
          git diff --exit-code -- test/mocks/proxmox_client.go
          go vet ./...
          go test -race ./...
      - name: Build artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/proxmox-cli-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/proxmox-cli-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/proxmox-cli-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/proxmox-cli-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o dist/proxmox-cli-windows-amd64.exe .
          cd dist && sha256sum * > checksums.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: dist/

  publish:
    needs: verify-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          path: dist/
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: dist/*
